# This template inherits from the official Docker template and adds Nix.
# See: https://lima-vm.io/docs/templates/

base:
  - template:docker

# Configuration parameters that can be overridden via `limactl create --set`
param:
  # The flake URI to use for synchronizing Nix configuration.
  flake: 'github:kachick/dotfiles/main'

user:
  name: 'user'

provision:
  # 1. Run the installer script.
  # We fetch the script from the provided flake URI to ensure we are testing the correct branch.
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      TARGET_FLAKE="{{.Param.flake}}"
      # Extract repo and branch from 'github:user/repo/branch' or 'github:user/repo'
      if [[ "${TARGET_FLAKE}" =~ ^github:([^/]+)/([^/]+)(/([^/]+))?$ ]]; then
          ORG="${BASH_REMATCH[1]}"
          REPO="${BASH_REMATCH[2]}"
          BRANCH="${BASH_REMATCH[4]:-main}"
          RAW_URL="https://raw.githubusercontent.com/${ORG}/${REPO}/${BRANCH}/scripts/install-nix.bash"
          echo "Fetching installer from: ${RAW_URL}"
          curl -fsSL "${RAW_URL}" | sudo -u {{.User}} bash -s -- "${TARGET_FLAKE}"
      else
          # Fallback to current main if pattern doesn't match
          curl -fsSL https://raw.githubusercontent.com/kachick/dotfiles/main/scripts/install-nix.bash | sudo -u {{.User}} bash -s -- "${TARGET_FLAKE}"
      fi

      # Force Nix profile loading for non-interactive shells in Ubuntu.
      if ! grep -q "nix-daemon.sh" /etc/bash.bashrc; then
        sed -i '1i if [ -e /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh ]; then . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh; fi' /etc/bash.bashrc
      fi
