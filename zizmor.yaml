rules:
  unpinned-uses:
    config:
      policies:
        kachick/*: any
        actions/*: any
        NixOS/*: any
        crate-ci/*: any
        dependabot/*: any
        dprint/*: any
        cachix/*: any
  excessive-permissions:
    ignore:
      - merge-bot-pr.yaml
      - cleanup-staging-packages.yaml
      - container.yaml
  template-injection:
    ignore:
      - container.yaml
      - cleanup-staging-packages.yaml
