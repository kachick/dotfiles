rules:
  unpinned-uses:
    config:
      policies:
        kachick/*: any
        actions/*: any
        NixOS/*: any
        crate-ci/*: any
        dependabot/*: any
        dprint/*: any
        cachix/*: any
  excessive-permissions:
    ignore:
      - merge-bot-pr.yml
      - cleanup-staging-packages.yml
      - container.yml
  template-injection:
    ignore:
      - container.yml
      - cleanup-staging-packages.yml
  secrets-outside-env:
    disable: true
  github-app:
    disable: true # TODO: Enable: https://github.com/kachick/dotfiles/pull/1580#issuecomment-4526205969
