# https://github.com/NixOS/nixos-artwork/blob/35ebbbf01c3119005ed180726c388a01d4d1100c/logo/README.md#L5
name: ❄️📦 🐧
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/package-linux.yml'
      - 'pkgs/**'
      - 'flake.lock'
      - 'overlays/**'
      - '!**.md'
  pull_request:
    paths:
      - '.github/workflows/package-linux.yml'
      - 'pkgs/**'
      - 'flake.lock'
      - 'overlays/**'
      - '!**.md'
  schedule:
    # Every 10:42 JST
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: '42 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  planning:
    runs-on: ubuntu-24.04
    outputs:
      packages: ${{ steps.set-matrix.outputs.packages }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - id: set-matrix
        run: |
          # Hardcoded packages that are always built
          TARGET_PACKAGES=(
            "kanata-tray"
            "lima-full"
            "zed-editor"
            "mozc"
            "yaneuraou-avx2"
            "hcpu_shogi"
          )

          # Dynamically add all shared-gomod packages
          SHARED_GOMOD_PKGS=$(nix run .#list-shared-gomod-pkgs)
          for pkg in $SHARED_GOMOD_PKGS; do
            TARGET_PACKAGES+=("$pkg")
          done

          # Deduplicate and format as JSON
          # Use a temporary associative array for deduplication (requires bash 4+)
          declare -A unique_pkgs
          for pkg in "${TARGET_PACKAGES[@]}"; do
            unique_pkgs["$pkg"]=1
          done

          JSON_PKGS=$(printf '%s\n' "${!unique_pkgs[@]}" | jq -R . | jq -s -c .)
          echo "packages=$JSON_PKGS" >> $GITHUB_OUTPUT

  build:
    needs: planning
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04]
        pname: ${{ fromJSON(needs.planning.outputs.packages) }}
        # Skip tests for heavy packages to avoid long build times in CI.
        # We trust upstream/hydra for these packages since we're just pinning/patching them.
        include:
          - pname: zed-editor
            skip_tests: true
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build package
        env:
          PNAME: ${{ matrix.pname }}
        run: nix build ".#$PNAME"
      - name: Run passthru tests
        # Use nix-build via flake-compat for simpler recursive building.
        # It automatically detects system architecture and skips if no tests exist.
        env:
          PNAME: ${{ matrix.pname }}
          SKIP_TESTS: ${{ matrix.skip_tests }}
        run: |
          if [[ "$SKIP_TESTS" == "true" ]]; then
            echo "Skipping tests for $PNAME as requested in matrix."
            exit 0
          fi

          if nix eval ".#$PNAME.passthru.tests" >/dev/null 2>&1; then
            nix-build --attr "packages.x86_64-linux.$PNAME.passthru.tests"
          else
            echo "No passthru.tests found for $PNAME, skipping."
          fi
