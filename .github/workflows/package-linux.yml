# https://github.com/NixOS/nixos-artwork/blob/35ebbbf01c3119005ed180726c388a01d4d1100c/logo/README.md#L5
name: ❄️📦 🐧
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/package-linux.yml'
      - 'pkgs/'
      - 'flake.lock'
      - 'overlays/**'
      - '!overlays/*.md'
      - '!overlays/**/*.md'
  pull_request:
    paths:
      - '.github/workflows/package-linux.yml'
      - 'pkgs/'
      - 'flake.lock'
      - 'overlays/**'
      - '!overlays/*.md'
      - '!overlays/**/*.md'
  schedule:
    # Every 10:42 JST
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: '42 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04]
        # Skip tests for heavy packages to avoid long build times in CI.
        # We trust upstream/hydra for these packages since we're just pinning/patching them.
        include:
          - pname: kanata-tray
          - pname: lima-full
          - pname: zed-editor
            skip_tests: true
          - pname: mozc
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    env:
      NIXPKGS_ALLOW_UNFREE: '1'
    steps:
      - name: Logging disk space
        run: df -h
      - name: Clean disk space as per https://github.com/actions/virtual-environments/issues/709
        # NOTE: This workflow removed 14 Gib in 50sec
        run: |
          docker image prune --all --force
          sudo rm -rf '/opt/ghc' \
            '/usr/share/dotnet' \
            "$AGENT_TOOLSDIRECTORY" \
             '/usr/local/lib/android' \
             '/usr/local/share/boost'
      - name: Logging disk space after clean
        run: df -h
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build package
        run: nix build '.#${{ matrix.pname }}'
      - name: Run passthru tests
        # Use nix-build via flake-compat for simpler recursive building.
        # It automatically detects system architecture and skips if no tests exist.
        run: |
          if [[ "${{ matrix.skip_tests }}" == "true" ]]; then
            echo "Skipping tests for ${{ matrix.pname }} as requested in matrix."
            exit 0
          fi

          if nix eval '.#${{ matrix.pname }}.passthru.tests' >/dev/null 2>&1; then
            nix-build --attr 'packages.x86_64-linux.${{ matrix.pname }}.passthru.tests'
          else
            echo 'No passthru.tests found for ${{ matrix.pname }}, skipping.'
          fi
