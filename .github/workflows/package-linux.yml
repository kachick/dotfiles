# https://github.com/NixOS/nixos-artwork/blob/35ebbbf01c3119005ed180726c388a01d4d1100c/logo/README.md#L5
name: ❄️📦 🐧
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/package-linux.yml'
      - '.github/actions/setup-nix/**'
      - 'cmd/ci-build/**'
      - 'pkgs/**'
      - 'flake.lock'
      - 'overlays/**'
      - '!**.md'
  pull_request:
    paths:
      - '.github/workflows/package-linux.yml'
      - '.github/actions/setup-nix/**'
      - 'cmd/ci-build/**'
      - 'pkgs/**'
      - 'flake.lock'
      - 'overlays/**'
      - '!**.md'
  schedule:
    # Every 10:42 JST
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: '42 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-26.04
    timeout-minutes: 180
    steps:
      - name: Logging disk space
        run: df -h
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - parallel:
          - name: Build package - archive-home-files
            run: go run ./cmd/ci-build package archive-home-files

          - name: Build package - conoha-cli
            run: go run ./cmd/ci-build package conoha-cli

          - name: Build package - git-hooks-pre-push
            run: go run ./cmd/ci-build package git-hooks-pre-push

          - name: Build package - hcpu_shogi
            run: go run ./cmd/ci-build package hcpu_shogi

          - name: Build package - ibm-plex-mono
            run: go run ./cmd/ci-build package ibm-plex-mono

          - name: Build package - ibm-plex-sans-jp
            run: go run ./cmd/ci-build package ibm-plex-sans-jp

          - name: Build package - ibm-plex-serif-variable
            run: go run ./cmd/ci-build package ibm-plex-serif-variable

          - name: Build package - ibus-engine-selector
            run: go run ./cmd/ci-build package ibus-engine-selector

          - name: Build package - kanata-tray
            run: go run ./cmd/ci-build package kanata-tray

          - name: Build package - lima-full
            run: go run ./cmd/ci-build package lima-full

          - name: Build package - mozc
            run: go run ./cmd/ci-build package mozc

          - name: Build package - nix-diff
            run: go run ./cmd/ci-build package nix-diff

          - name: Build package - reponame
            run: go run ./cmd/ci-build package reponame

          - name: Build package - yaneuraou-avx2
            run: go run ./cmd/ci-build package yaneuraou-avx2

          - name: Build package - zed-editor
            run: go run ./cmd/ci-build package zed-editor --skip-tests
