# https://github.com/NixOS/nixos-artwork/blob/35ebbbf01c3119005ed180726c388a01d4d1100c/logo/README.md#L5
name: ❄️📦 🐧
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/package-linux.yml'
      - '.github/actions/setup-nix/**'
      - '.github/scripts/ci-build-package.bash'
      - 'pkgs/**'
      - 'flake.lock'
      - 'overlays/**'
      - '!**.md'
  pull_request:
    paths:
      - '.github/workflows/package-linux.yml'
      - '.github/actions/setup-nix/**'
      - '.github/scripts/ci-build-package.bash'
      - 'pkgs/**'
      - 'flake.lock'
      - 'overlays/**'
      - '!**.md'
  schedule:
    # Every 10:42 JST
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: '42 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-26.04
    timeout-minutes: 180
    steps:
      - name: Logging disk space
        run: df -h
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - parallel:
          - name: Build package - archive-home-files
            run: ./.github/scripts/ci-build-package.bash archive-home-files x86_64-linux

          - name: Build package - conoha-cli
            run: ./.github/scripts/ci-build-package.bash conoha-cli x86_64-linux

          - name: Build package - git-hooks-pre-push
            run: ./.github/scripts/ci-build-package.bash git-hooks-pre-push x86_64-linux

          - name: Build package - hcpu_shogi
            run: ./.github/scripts/ci-build-package.bash hcpu_shogi x86_64-linux

          - name: Build package - ibm-plex-mono
            run: ./.github/scripts/ci-build-package.bash ibm-plex-mono x86_64-linux

          - name: Build package - ibm-plex-sans-jp
            run: ./.github/scripts/ci-build-package.bash ibm-plex-sans-jp x86_64-linux

          - name: Build package - ibm-plex-serif-variable
            run: ./.github/scripts/ci-build-package.bash ibm-plex-serif-variable x86_64-linux

          - name: Build package - ibus-engine-selector
            run: ./.github/scripts/ci-build-package.bash ibus-engine-selector x86_64-linux

          - name: Build package - kanata-tray
            run: ./.github/scripts/ci-build-package.bash kanata-tray x86_64-linux

          - name: Build package - lima-full
            run: ./.github/scripts/ci-build-package.bash lima-full x86_64-linux

          - name: Build package - mozc
            run: ./.github/scripts/ci-build-package.bash mozc x86_64-linux

          - name: Build package - nix-diff
            run: ./.github/scripts/ci-build-package.bash nix-diff x86_64-linux

          - name: Build package - reponame
            run: ./.github/scripts/ci-build-package.bash reponame x86_64-linux

          - name: Build package - yaneuraou-avx2
            run: ./.github/scripts/ci-build-package.bash yaneuraou-avx2 x86_64-linux

          - name: Build package - zed-editor
            run: ./.github/scripts/ci-build-package.bash zed-editor x86_64-linux true
