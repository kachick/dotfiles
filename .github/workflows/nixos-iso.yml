name: 💿 NixOS ISO
on:
  pull_request:
    types: [labeled, opened, synchronize, reopened]
  workflow_dispatch:
  schedule:
    # Every 12:42 JST
    - cron: '42 3 * * *'

permissions:
  contents: read

jobs:
  build:
    # Trigger on:
    # 1. Schedule or manual dispatch
    # 2. Pull request ONLY IF the 'nixos-iso' label is present
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'nixos-iso'))
    runs-on: ubuntu-26.04
    timeout-minutes: 180
    steps:
      - name: Logging disk space
        run: df -h
      # Prevent problems such as https://github.com/kachick/dotfiles/pull/1402#issuecomment-3736925185
      - name: Clean disk space as per https://github.com/actions/virtual-environments/issues/709
        # NOTE: This workflow removed 14 Gib in 50sec
        # On the otherhand, additional apt purge step removed 6 Gib in 100s, so I don't want to use the additional steps for now
        run: |
          docker image prune --all --force
          sudo rm -rf '/opt/ghc' \
            '/usr/share/dotnet' \
            "$AGENT_TOOLSDIRECTORY" \
             '/usr/local/lib/android' \
             '/usr/local/share/boost'
      - name: Logging disk space after clean
        run: df -h
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build NixOS ISO
        run: |
          nix build ".#nixosConfigurations.installer.config.system.build.isoImage" --show-trace
      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v7
        with:
          path: result/iso/*.iso
          archive: false
