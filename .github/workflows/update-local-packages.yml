name: 🆙 local packages
on:
  pull_request:
    paths:
      - '.github/workflows/update-local-packages.yml'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Skip side-effect if true'
        default: false
        required: true
        type: boolean
  workflow_call:
    inputs:
      dry-run:
        default: false
        required: false
        type: boolean
    secrets:
      PRIVATE_KEY:
        required: true

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main

jobs:
  create-pr:
    strategy:
      fail-fast: false
      matrix:
        package:
          - lima
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      PR_BRANCH: bot-update-${{ matrix.package }}
      IS_DRY_RUN: ${{ (inputs.dry-run || github.event_name == 'pull_request') && 'true' || 'false' }}
    steps:
      # To push workflow changes and trigger CIs
      - name: Generate GitHub Apps token
        id: publish-token
        if: env.IS_DRY_RUN == 'false'
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          # Required to set workflow permission for the APP
          # Why replaced from secrets?: https://github.com/github/docs/commit/eaac671cdd9189afd410366e9eb5edd4ee815194#diff-19d2b329775bf781d0cf19fabafa7f231bd85f133cbf9e23594036ea68f7021dL53-R54
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.1
        with:
          # Needed to get commit counts
          # https://stackoverflow.com/a/65056108
          fetch-depth: 0
          # Needed to specify token for checkout phase, only in pushing phase is too late
          # https://github.com/orgs/community/discussions/27072#discussioncomment-3254515
          token: ${{ steps.publish-token.outputs.token || github.token }}
          # This value is explicitly set to true to prevent regression that occurred in selfup v1.2.1, even though it is the default for actions/checkout.
          # Many linters recommend setting this to false, and most users have requested it as the new default (see https://github.com/actions/checkout/issues/485).
          # However, this workflow depends on the stored credentials for the subsequent git push command.
          # For this reason, true is required for now.
          persist-credentials: true
      - name: Fetch active PRs by me
        if: env.IS_DRY_RUN == 'false'
        id: fetch-active-prs
        env:
          GITHUB_TOKEN: ${{ steps.publish-token.outputs.token }}
        run: |
          count="$(gh pr list --author "@me" --state open --head "${PR_BRANCH}" --json number --jq 'length')"
          echo "count=${count}" | tee -a "$GITHUB_OUTPUT"
      - name: Prepare Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Prepare Git branch
        run: |
          git switch -C "${PR_BRANCH}" "origin/${{ env.DEFAULT_BRANCH }}"

      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Install dependencies
        run: |
          nix profile add 'https://channels.nixos.org/nixpkgs-unstable/nixexprs.tar.xz#nix-update'

      # Perform evaluation before nix-update to ensure IFD (like patched nixpkgs) is built and valid in store.
      # This addresses the "path ...-patched-nixpkgs-unstable.drv is not valid" error in GHA.
      - name: Pre-evaluate package
        run: |
          nix eval --raw ".#${PACKAGE}.pname"
        env:
          PACKAGE: ${{ matrix.package }}

      # Use manual commit because `nix-update --commit` performs strict evaluation
      # which causes "path ... is not valid" errors in GHA for patched nixpkgs.
      - name: Update packages
        run: |
          title="$(nix-update --flake "${PACKAGE}" --print-commit-message)"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            git commit -m "${title}"
          fi
        env:
          PACKAGE: ${{ matrix.package }}

      - name: Count added commits
        id: count-commits
        run: |
          count="$(git rev-list --count 'origin/${{ env.DEFAULT_BRANCH }}..')"
          echo "count=${count}" | tee -a "$GITHUB_OUTPUT"
          case "${count}" in
            0)
              ;;
            1)
              echo "title=$(git log -1 --format=%s)" | tee -a "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unexpected commit count: ${count}"
              exit 1
              ;;
          esac
      - run: git push origin "${PR_BRANCH}" --force
        if: (env.IS_DRY_RUN == 'false') && (steps.count-commits.outputs.count > 0)
      - name: Create PR
        if: (env.IS_DRY_RUN == 'false') && (steps.count-commits.outputs.count > 0) && (steps.fetch-active-prs.outputs.count == 0)
        env:
          GITHUB_TOKEN: '${{ steps.publish-token.outputs.token }}'
          PR_TITLE: ${{ steps.count-commits.outputs.title }}
          PR_BODY: |
            Updating ${{ matrix.package }} to the latest version.
        run: |
          gh pr create \
            --base '${{ env.DEFAULT_BRANCH }}' \
            --title "${PR_TITLE}" \
            --body "${PR_BODY}"
