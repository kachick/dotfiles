name: Lima Guest Provisioning Test

on:
  push:
    branches: [main]
    paths:
      - 'config/lima/**'
      - 'home-manager/lima-guest.nix'
      - 'home-manager/default.nix'
      - 'Taskfile.yml'
      - '.github/workflows/lima-guest.yml'
  pull_request:
    paths:
      - 'config/lima/**'
      - 'home-manager/lima-guest.nix'
      - 'home-manager/default.nix'
      - 'Taskfile.yml'
      - '.github/workflows/lima-guest.yml'
  workflow_dispatch:
  schedule:
    # Every Sunday at 00:00 UTC to catch upstream breakages
    - cron: '0 0 * * 0'

permissions:
  contents: read

jobs:
  # IMPORTANT: These jobs MUST remain split.
  # GitHub Actions only saves the cache if the job completes successfully.
  prepare-image:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - uses: lima-vm/lima-actions/setup@1be8c646a08d3a8c1186531108508cde33394b52 # v1
        id: lima-setup
        with:
          version: 'v2.0.3' # selfup {"extract":"v?\\d\\.\\d+\\.\\d+","replacer":["limactl", "--version"], "nth": 3}

      - name: Cache Lima
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/lima
            ~/.lima
          key: lima-${{ steps.lima-setup.outputs.version }}
          restore-keys: |
            lima-${{ steps.lima-setup.outputs.version }}-

      - name: Create Lima Instance from standard template
        run: |
          limactl delete -f docker-nix || true
          limactl create --yes --name=docker-nix template://docker

  test-provisioning:
    needs: prepare-image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - uses: lima-vm/lima-actions/setup@1be8c646a08d3a8c1186531108508cde33394b52 # v1
        id: lima-setup
        with:
          version: 'v2.0.3' # selfup {"extract":"v?\\d\\.\\d+\\.\\d+","replacer":["limactl", "--version"], "nth": 3}

      - name: Cache Lima
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/lima
            ~/.lima
          key: lima-${{ steps.lima-setup.outputs.version }}
          restore-keys: |
            lima-${{ steps.lima-setup.outputs.version }}-

      - name: Start docker-nix
        run: limactl start --name=docker-nix --tty=false

      - name: Install and configure Nix in Guest
        env:
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          REF="${HEAD_REF:-$REF_NAME}"
          FLAKE_URI="github:kachick/dotfiles/${REF}"
          RAW_URL="https://raw.githubusercontent.com/kachick/dotfiles/${REF}/scripts/install-nix.bash"

          # Use the installer script from the current branch.
          # It will configure caches using the flake from the same branch.
          limactl shell docker-nix bash -c "curl -fsSL ${RAW_URL} | bash -s -- ${FLAKE_URI}"

      - name: Verify Nix and Binary Cache in Guest
        env:
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          REF="${HEAD_REF:-$REF_NAME}"
          FLAKE_URI="github:kachick/dotfiles/${REF}"

          # 1. Basic nix version check
          limactl shell docker-nix nix --version

          # 2. Verify custom binary cache by running a lightweight local package.
          # If the cache is working, this should fetch the binary instead of building it.
          limactl shell docker-nix nix run --accept-flake-config "${FLAKE_URI}#la" -- --version
