name: ❄️ NixOS CI
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-nixos.yml'
      - '.github/actions/setup-nix/**'
      - '.github/scripts/ci-build-nixos.bash'
      - 'nixos/**'
      - 'flake.*'
      - '!**.md'
  pull_request:
    types: [labeled, opened, synchronize, reopened]
    paths:
      - '.github/workflows/ci-nixos.yml'
      - '.github/actions/setup-nix/**'
      - '.github/scripts/ci-build-nixos.bash'
      - 'nixos/**'
      - 'flake.*'
      - '!**.md'
  workflow_dispatch:
  schedule:
    # Every 10:42 JST
    - cron: '42 1 * * *'

permissions:
  contents: read

# Ensure only one run per branch/PR at a time.
# Queue new runs instead of cancelling existing ones to ensure heavy builds complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  wait:
    runs-on: ubuntu-26.04
    steps:
      - name: Wait other jobs to leverage binary caches
        uses: kachick/wait-other-jobs@v4
        timeout-minutes: 180
        with:
          # Only wait for workflows that provide binary caches to avoid deadlocks
          wait-list: |
            [
              { "workflowFile": "package-linux.yml", "optional": true }
            ]
          event-list: '[ "${{ github.event_name }}", "dynamic" ]'

  build:
    needs: [wait]
    # Run if:
    # 1. Previous 'wait' job succeeded OR was skipped (non-PR case).
    # 2. It's not a pull request (push, schedule, etc.)
    # 3. It's a pull request and:
    #    - The 'nixos-rebuild' label is attached
    #    - OR it was triggered by paths (action != labeled)
    if: >-
      always() &&
      (needs.wait.result == 'success' || needs.wait.result == 'skipped') &&
      (github.event_name != 'pull_request' ||
       (github.event_name == 'pull_request' && (
         contains(github.event.pull_request.labels.*.name, 'nixos-rebuild') ||
         github.event.action != 'labeled'
       )))
    runs-on: ubuntu-26.04
    timeout-minutes: 180
    steps:
      - name: Logging disk space
        run: df -h
      # Prevent problems such as https://github.com/kachick/dotfiles/pull/1402#issuecomment-3736925185
      - name: Clean disk space as per https://github.com/actions/virtual-environments/issues/709
        # NOTE: This workflow removed 14 Gib in 50sec
        # On the otherhand, additional apt purge step removed 6 Gib in 100s, so I don't want to use the additional steps for now
        run: |
          docker image prune --all --force
          sudo rm -rf '/opt/ghc' \
            '/usr/share/dotnet' \
            "$AGENT_TOOLSDIRECTORY" \
             '/usr/local/lib/android' \
             '/usr/local/share/boost'
      - name: Logging disk space after clean
        run: df -h
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - parallel:
          - name: Build NixOS - vps
            run: ./.github/scripts/ci-build-nixos.bash vps

          - name: Build NixOS - desktop-free
            run: ./.github/scripts/ci-build-nixos.bash desktop-free

          - name: Build NixOS - wsl
            run: ./.github/scripts/ci-build-nixos.bash wsl

  test-sample:
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Install direnv
        run: |
          url="$(nix eval --raw --impure --expr '(builtins.fromJSON (builtins.readFile ./flake.lock)).nodes.nixpkgs.locked.url')"
          nix profile add "${url}#direnv"
      - name: Load environment variables
        run: |
          direnv allow .
          direnv export gha > "$GITHUB_ENV"

      - name: Verify sample configuration template
        # Use direnv or `nix develop` to ensure `task` is available from devShell
        run: task test-sample-nixos
