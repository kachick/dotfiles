name: ❄️ NixOS CI
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-nixos.yml'
      - 'nixos/**'
      - 'flake.*'
      - '!**.md'
  pull_request:
    types: [labeled, opened, synchronize, reopened]
    paths:
      - '.github/workflows/ci-nixos.yml'
      - 'nixos/**'
      - 'flake.*'
      - '!**.md'
  workflow_dispatch:
  schedule:
    # Every 10:42 JST
    - cron: '42 1 * * *'

permissions:
  contents: read

# Ensure only one run per branch/PR at a time.
# Queue new runs instead of cancelling existing ones to ensure heavy builds complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  wait:
    runs-on: ubuntu-24.04
    steps:
      - name: Wait other jobs to leverage binary caches
        uses: kachick/wait-other-jobs@v4
        timeout-minutes: 180
        with:
          # Only wait for workflows that provide binary caches to avoid deadlocks
          wait-list: |
            [
              { "workflowFile": "package-linux.yml", "optional": true },
              { "workflowFile": "ci-home-linux.yml", "optional": true }
            ]
          event-list: '[ "${{ github.event_name }}", "dynamic" ]'

  build:
    needs: [wait]
    # Run if:
    # 1. Previous 'wait' job succeeded OR was skipped (non-PR case).
    # 2. It's not a pull request (push, schedule, etc.)
    # 3. It's a pull request and:
    #    - The 'nixos-rebuild' label is attached
    #    - OR it was triggered by paths (action != labeled)
    if: >-
      always() &&
      (needs.wait.result == 'success' || needs.wait.result == 'skipped') &&
      (github.event_name != 'pull_request' ||
       (github.event_name == 'pull_request' && (
         contains(github.event.pull_request.labels.*.name, 'nixos-rebuild') ||
         github.event.action != 'labeled'
       )))
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        host: [moss, algae, wsl]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          # Enable manual push with auth token, but skip automatic push to use the filter utility.
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skip-push: true
      - name: Build NixOS system [${{ matrix.host }}]
        run: |
          nix build ".#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel" --show-trace 2> >(tee /tmp/nix-stderr >&2)
          # Fail if evaluation warnings were detected
          if grep -i "warning:" /tmp/nix-stderr; then
            echo "❌ Nix evaluation warnings detected!"
            exit 1
          fi
      - name: Log excluded unfree packages
        if: always()
        run: |
          echo "::group::Excluded Unfree Packages [${{ matrix.host }}]"
          nix run .#list-system-packages-by-license -- ${{ matrix.host }} --eval-allowed-unfree-package-names
          echo "::endgroup::"
      - name: Push free licensed paths to Cachix
        # Pushing only free-licensed paths to avoid license issues with public caches.
        # This step uses our custom utility to accurately filter the closure.
        run: |
          nix run .#list-system-packages-by-license -- ${{ matrix.host }} --filter-free-licensed-closure-from-build-result > to_push.txt
          echo "Summary: $(wc -l < to_push.txt) paths will be pushed."
          # Use nix run nixpkgs#cachix to ensure the command is available regardless of the environment setup.
          cat to_push.txt | nix run nixpkgs#cachix -- push kachick-dotfiles

  test-sample:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ''
          skip-push: true
      - name: Verify sample configuration template
        # Using `nix develop` to ensure `task` is available from devShell
        run: nix develop --command task test-sample-nixos
