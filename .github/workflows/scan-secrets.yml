name: 🙈
on: [pull_request, push, workflow_dispatch]
permissions:
  contents: read
jobs:
  gitleaks:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      # - gitleaks-action is unfree since v2, Don't refer the code even if used in personal repositories
      # - Don't optimize gitleaks with the upstream assets. See https://github.com/kachick/dotfiles/pull/1500#discussion_r2944941780 for background
      - name: Install Nix
        uses: NixOS/nix-installer-action@main # There are no tagged releases
      - name: Install gitleaks
        # Strictly speaking, it should respect flake.lock. However, downloading multiple tarballs slows down the workflow. Therefore, I will allow for gitleaks version mismatches here.
        # TODO: Consider using betterleaks once https://github.com/NixOS/nixpkgs/pull/500481 has merged
        run: nix profile add 'https://channels.nixos.org/nixpkgs-unstable/nixexprs.tar.xz#gitleaks'
      - name: Make sure installed gitleaks version
        run: 'gitleaks version'
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0 # Getting all refs for git mode
          persist-credentials: false
      - name: Run
        # For CI use in public repositories, ensuring full-redact does not ensure to avoid actual problems, should not forget it :)
        run: |
          gitleaks git . --redact=100
