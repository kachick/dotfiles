name: ❄️ Diff
on:
  pull_request:
    paths:
      - 'flake.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  nix-diff:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v30
      - uses: actions/setup-go@v5.3.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Generate diff report
        id: report
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          BASE_FLAKE="github:${GITHUB_REPOSITORY}/${GITHUB_BASE_REF}"
          # Use tee to show progress in logs while capturing for the report
          go run ./cmd/nix-diff/main.go -base "$BASE_FLAKE" | tee diff_report.md

          if grep -q "<details" diff_report.md; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync PR comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HAS_DIFF: ${{ steps.report.outputs.has_diff }}
        run: |
          # Always remove previous report to keep the PR clean and synchronized with the current commit
          gh api "repos/{owner}/{repo}/issues/${PR_NUMBER}/comments" --paginate | \
            jq -r '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("## ❄️ Nix Package Version Changes"))) | .id' | \
            xargs -I {} gh api -X DELETE "repos/{owner}/{repo}/issues/comments/{}"

          # Post the new report only if there are actual package changes relative to the base branch
          if [[ "$HAS_DIFF" == "true" ]]; then
            gh pr comment "$PR_NUMBER" --body-file diff_report.md
          fi
